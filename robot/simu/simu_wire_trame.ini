//========================================================================
// simu_wire_trame.ini
// Fichier de simulation des trames du capteur inductif (Enveloppe)
//========================================================================

// Les fonctions "signal void" n'acceptent AUCUN argument dans le simulateur Keil.
// Les tableaux et strings globaux posent aussi probleme sans DEFINE explicite.
// On doit donc "dérouler" les trames une par une, ligne par ligne.

signal void send_trame_vitesse_robot1(void) {
    // Trame Réelle : Vitesse 40% pour le Robot 1
    // Type = 000 (Vitesse)
    // Robot = 0001 (1)
    // Valeur = 0101000 (40)
    // Séquence : E e 0 o 0 o 0 o 0 o 0 o 0 o 1 i 0 o 1 i 0 o 1 i 0 o 0 o 0 o
    PORT0 &= ~(1<<28); swatch(0.001); // Repos initial
    printf("Envoi vraie trame (Vitesse 40%% Robot 1)...\n");
    
    // Entetes (E e)
    PORT0 |= (1<<28); swatch(0.00325); PORT0 &= ~(1<<28); swatch(0.0005);
    PORT0 |= (1<<28); swatch(0.00275); PORT0 &= ~(1<<28); swatch(0.0005);
    
    // Type 000 (0 o 0 o 0 o)
    PORT0 |= (1<<28); swatch(0.00075); PORT0 &= ~(1<<28); swatch(0.0005);
    PORT0 |= (1<<28); swatch(0.00125); PORT0 &= ~(1<<28); swatch(0.0005);
    PORT0 |= (1<<28); swatch(0.00075); PORT0 &= ~(1<<28); swatch(0.0005);
    PORT0 |= (1<<28); swatch(0.00125); PORT0 &= ~(1<<28); swatch(0.0005);
    PORT0 |= (1<<28); swatch(0.00075); PORT0 &= ~(1<<28); swatch(0.0005);
    PORT0 |= (1<<28); swatch(0.00125); PORT0 &= ~(1<<28); swatch(0.0005);

    // Robot 0001 (0 o 0 o 0 o 1 i)
    PORT0 |= (1<<28); swatch(0.00075); PORT0 &= ~(1<<28); swatch(0.0005);
    PORT0 |= (1<<28); swatch(0.00125); PORT0 &= ~(1<<28); swatch(0.0005);
    PORT0 |= (1<<28); swatch(0.00075); PORT0 &= ~(1<<28); swatch(0.0005);
    PORT0 |= (1<<28); swatch(0.00125); PORT0 &= ~(1<<28); swatch(0.0005);
    PORT0 |= (1<<28); swatch(0.00075); PORT0 &= ~(1<<28); swatch(0.0005);
    PORT0 |= (1<<28); swatch(0.00125); PORT0 &= ~(1<<28); swatch(0.0005);
    PORT0 |= (1<<28); swatch(0.00175); PORT0 &= ~(1<<28); swatch(0.0005);
    PORT0 |= (1<<28); swatch(0.00225); PORT0 &= ~(1<<28); swatch(0.0005);

    // Valeur 0101000 (0 o 1 i 0 o 1 i 0 o 0 o 0 o)
    PORT0 |= (1<<28); swatch(0.00075); PORT0 &= ~(1<<28); swatch(0.0005);
    PORT0 |= (1<<28); swatch(0.00125); PORT0 &= ~(1<<28); swatch(0.0005);
    PORT0 |= (1<<28); swatch(0.00175); PORT0 &= ~(1<<28); swatch(0.0005);
    PORT0 |= (1<<28); swatch(0.00225); PORT0 &= ~(1<<28); swatch(0.0005);
    PORT0 |= (1<<28); swatch(0.00075); PORT0 &= ~(1<<28); swatch(0.0005);
    PORT0 |= (1<<28); swatch(0.00125); PORT0 &= ~(1<<28); swatch(0.0005);
    PORT0 |= (1<<28); swatch(0.00175); PORT0 &= ~(1<<28); swatch(0.0005);
    PORT0 |= (1<<28); swatch(0.00225); PORT0 &= ~(1<<28); swatch(0.0005);
    PORT0 |= (1<<28); swatch(0.00075); PORT0 &= ~(1<<28); swatch(0.0005);
    PORT0 |= (1<<28); swatch(0.00125); PORT0 &= ~(1<<28); swatch(0.0005);
    PORT0 |= (1<<28); swatch(0.00075); PORT0 &= ~(1<<28); swatch(0.0005);
    PORT0 |= (1<<28); swatch(0.00125); PORT0 &= ~(1<<28); swatch(0.0005);
    PORT0 |= (1<<28); swatch(0.00075); PORT0 &= ~(1<<28); swatch(0.0005);
    PORT0 |= (1<<28); swatch(0.00125); PORT0 &= ~(1<<28); swatch(0.0005);

    printf("Fin envoi trame.\n");
}

signal void send_idle_traffic(void) {
    int i;
    PORT0 &= ~(1<<28); swatch(0.001);
    printf("Envoi trafic de repos (E e E e... pour 30 cycles)\n");
    for(i = 0; i < 30; i++) {
        PORT0 |= (1<<28); swatch(0.00325); PORT0 &= ~(1<<28); swatch(0.0005); // E
        PORT0 |= (1<<28); swatch(0.00275); PORT0 &= ~(1<<28); swatch(0.0005); // e
    }
    printf("Trafic de repos termine.\n");
}
