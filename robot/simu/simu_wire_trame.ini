// Exemple 1 : Trame Nord classique (E suivi de 14 zéros)
signal void send_trame_nord(void) {
    int i;
    PORT0 &= ~(1<<28); swatch(0.001);
    printf("Envoi trame Nord...\n");
    
    // Symbole E (Entête Nord)
    PORT0 |= (1<<28); swatch(0.00325); PORT0 &= ~(1<<28); swatch(0.0005);
    
    // 14 bits à '0' (Symbole 0 Nord)
    for (i = 0; i < 14; i++) {
        PORT0 |= (1<<28); swatch(0.00075); PORT0 &= ~(1<<28); swatch(0.0005);
    }
}

// Exemple 2 : Trame entrelacée (E e 1 i 0 o 0 o...)
signal void send_trame_entrelacee(void) {
    int i;
    printf("Envoi trame Entrelacée...\n");
    
    // Symbole E (Entête Nord)
    PORT0 |= (1<<28); swatch(0.00325); PORT0 &= ~(1<<28); swatch(0.0005);
    
    // Symbole e (Entête Sud)
    PORT0 |= (1<<28); swatch(0.00275); PORT0 &= ~(1<<28); swatch(0.0005);
    
    // Bit '1' Nord
    PORT0 |= (1<<28); swatch(0.00175); PORT0 &= ~(1<<28); swatch(0.0005);
    
    // Bit 'i' Sud (valeur 1)
    PORT0 |= (1<<28); swatch(0.00225); PORT0 &= ~(1<<28); swatch(0.0005);
    
    // Les 13 bits restants à 0 pour Nord et Sud (0 et o)
    for(i=0; i<13; i++) {
        // Bit '0' Nord
        PORT0 |= (1<<28); swatch(0.00075); PORT0 &= ~(1<<28); swatch(0.0005);
        // Bit 'o' Sud
        PORT0 |= (1<<28); swatch(0.00125); PORT0 &= ~(1<<28); swatch(0.0005);
    }
}
